<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>EpiWave - 3D Brain Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'SF Mono', monospace;
            background: #0a0f0d;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* EEG Canvas Background (YOUR THEME) */
        #eegCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            display: block;
        }

        /* Three.js canvas on top */
        #threeCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            display: block;
        }

        /* UI Overlay */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 20px 30px;
            z-index: 20;
            background: linear-gradient(180deg, rgba(10, 15, 13, 0.9) 0%, transparent 100%);
            pointer-events: none;
        }

        .title {
            color: #3affd0;
            font-family: 'SF Mono', monospace;
            font-size: 1rem;
            letter-spacing: 0.2em;
        }

        .title span {
            font-weight: 600;
            color: white;
        }

        .status {
            color: #3affd0;
            background: rgba(0, 0, 0, 0.5);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(58, 255, 208, 0.3);
            font-family: monospace;
        }

        /* Control panel - matches your buttons */
        .control-panel {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 15px;
            z-index: 20;
            padding: 15px;
            background: rgba(10, 15, 13, 0.7);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(58, 255, 208, 0.2);
            border-bottom: 1px solid rgba(58, 255, 208, 0.2);
        }

        .btn {
            background: rgba(10, 20, 18, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(58, 255, 208, 0.4);
            color: #ccfff0;
            font-size: 0.85rem;
            font-weight: 400;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'SF Mono', monospace;
            letter-spacing: 0.1em;
        }

        .btn:hover {
            background: rgba(58, 255, 208, 0.15);
            border-color: rgba(58, 255, 208, 0.8);
            transform: translateY(-2px);
        }

        .btn-normal { border-color: #3affd0; }
        .btn-warning { border-color: #ffaa44; }
        .btn-seizure { border-color: #ff3366; }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 8px 18px;
            font-size: 0.75rem;
            pointer-events: auto;
            z-index: 21;
            background: rgba(0, 0, 0, 0.6);
            border-color: #ffffff;
            color: white;
            text-decoration: none;
        }

        .instruction {
            position: absolute;
            bottom: 100px;
            right: 20px;
            color: #3a6a5a;
            font-size: 0.65rem;
            background: rgba(0, 0, 0, 0.4);
            padding: 5px 12px;
            border-radius: 15px;
            pointer-events: none;
            z-index: 20;
            font-family: monospace;
        }

        @media (max-width: 768px) {
            .btn { padding: 6px 16px; font-size: 0.7rem; }
            .title { font-size: 0.7rem; }
            .status { font-size: 0.6rem; }
        }
    </style>
</head>
<body>

    <!-- EEG Background Canvas -->
    <canvas id="eegCanvas"></canvas>

    <div class="top-bar">
        <div class="title">EPI<span>WAVE</span> // 3D BRAIN MONITOR</div>
        <div class="status" id="statusText">🟢 STATE: NORMAL</div>
    </div>

    <a href="epiwave_landing.html" class="btn back-btn">← BACK</a>


    <div class="control-panel">
        <button class="btn btn-normal" id="btnNormal">🟢 NORMAL</button>
        <button class="btn btn-warning" id="btnWarning">🟠 PRE-SEIZURE</button>
        <button class="btn btn-seizure" id="btnSeizure">🔴 SEIZURE</button>
    </div>

    <div class="instruction">🖱️ DRAG TO ROTATE | AUTO-ROTATING 360°</div>

    <script>
        // ========== EEG BACKGROUND (YOUR EXACT THEME) ==========
        const canvas = document.getElementById('eegCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let time = 0;
        const channels = ['Fp1', 'Fp2', 'F3', 'F4', 'C3', 'C4', 'P3', 'P4', 'O1', 'O2'];
        
        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        
        function drawEEG() {
            if (!ctx) return;
            
            ctx.fillStyle = '#0a120e';
            ctx.fillRect(0, 0, width, height);
            
            const channelCount = channels.length;
            const channelHeight = height / channelCount;
            
            // Vertical grid
            ctx.beginPath();
            ctx.strokeStyle = '#1a4a3a';
            ctx.lineWidth = 0.5;
            for (let x = 0; x < width; x += 40) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
            }
            
            // Horizontal grid
            for (let i = 1; i < channelCount; i++) {
                const yPos = i * channelHeight;
                ctx.beginPath();
                ctx.moveTo(0, yPos);
                ctx.lineTo(width, yPos);
                ctx.stroke();
            }
            
            // Channel labels
            ctx.font = '11px "SF Mono", monospace';
            ctx.fillStyle = '#3a9e7a';
            for (let i = 0; i < channelCount; i++) {
                const yPos = (i + 0.5) * channelHeight;
                ctx.fillText(channels[i], 12, yPos + 4);
                ctx.fillText(channels[i], width - 35, yPos + 4);
            }
            
            
            
            const calX = width - 70;
            const calY = 25;
            ctx.beginPath();
            ctx.strokeStyle = '#3a9e7a';
            ctx.lineWidth = 0.8;
            ctx.moveTo(calX, calY);
            ctx.lineTo(calX + 40, calY);
            ctx.moveTo(calX + 20, calY - 20);
            ctx.lineTo(calX + 20, calY + 20);
            ctx.stroke();
            ctx.fillStyle = '#3a9e7a';
            ctx.font = '8px monospace';
            ctx.fillText('50µV', calX + 45, calY + 4);
            
          
            ctx.fillStyle = '#2a7a5a';
            ctx.font = '8px monospace';
            ctx.fillText('Sensitivity: 10µV/mm', width - 150, 12);
            ctx.fillText('TC: 0.3s', width - 150, 24);
            ctx.fillText('HF: 70Hz', width - 150, 36);
            
            time += 0.022;
            requestAnimationFrame(drawEEG);
        }
        
        window.addEventListener('resize', () => resizeCanvas());
        resizeCanvas();
        drawEEG();
    </script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        // Setup scene (transparent to show EEG background)
        const scene = new THREE.Scene();
        scene.background = null;
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(2.5, 1.8, 3.5);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setClearColor(0x000000, 0);
        document.body.appendChild(renderer.domElement);
        renderer.domElement.style.position = 'fixed';
        renderer.domElement.style.top = '0';
        renderer.domElement.style.left = '0';
        renderer.domElement.style.zIndex = '1';
        
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.5;
        controls.enableZoom = true;
        controls.enablePan = false;
        controls.target.set(0, 0.1, 0);
        
        // Lighting (turquoise theme)
        const ambientLight = new THREE.AmbientLight(0x1a2a24, 0.5);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xd0f0e8, 1.2);
        mainLight.position.set(2, 3, 4);
        scene.add(mainLight);
        
        const fillLight = new THREE.PointLight(0x3a8a7a, 0.4);
        fillLight.position.set(0, 1, 2);
        scene.add(fillLight);
        
        const accentLight = new THREE.PointLight(0x3affd0, 0.6);
        accentLight.position.set(1.2, 0.8, 1.5);
        scene.add(accentLight);
        
        // Create brain
        const brainGroup = new THREE.Group();
        const brainMat = new THREE.MeshStandardMaterial({ color: 0xccaa88, roughness: 0.3, metalness: 0.1 });
        
        // Left hemisphere
        const leftBrain = new THREE.Mesh(new THREE.SphereGeometry(0.68, 96, 96), brainMat);
        leftBrain.position.set(-0.36, 0.1, 0);
        leftBrain.scale.set(0.92, 0.96, 0.84);
        brainGroup.add(leftBrain);
        
        // Right hemisphere
        const rightBrain = new THREE.Mesh(new THREE.SphereGeometry(0.68, 96, 96), brainMat);
        rightBrain.position.set(0.36, 0.1, 0);
        rightBrain.scale.set(0.92, 0.96, 0.84);
        brainGroup.add(rightBrain);
        
        // Center connection
        const connectorMat = new THREE.MeshStandardMaterial({ color: 0xbb9977 });
        const connector = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.55, 0.5), connectorMat);
        connector.position.set(0, 0.05, 0.1);
        brainGroup.add(connector);
        
        // Cerebellum
        const cerebMat = new THREE.MeshStandardMaterial({ color: 0xaa8866 });
        const cerebellum = new THREE.Mesh(new THREE.SphereGeometry(0.45, 80, 80), cerebMat);
        cerebellum.position.set(0, -0.45, -0.68);
        cerebellum.scale.set(0.95, 0.52, 0.72);
        brainGroup.add(cerebellum);
        
        // Brainstem
        const stemMat = new THREE.MeshStandardMaterial({ color: 0x997755 });
        const brainstem = new THREE.Mesh(new THREE.CylinderGeometry(0.19, 0.25, 0.55, 32), stemMat);
        brainstem.position.set(0, -0.72, -0.46);
        brainGroup.add(brainstem);
        
        scene.add(brainGroup);
        
        // Glow points
        const glowPoints = [];
        const glowPositions = [
            { x: 0.55, y: 0.35, z: 0.62 }, { x: -0.55, y: 0.35, z: 0.62 },
            { x: 0.65, y: -0.05, z: 0.52 }, { x: -0.65, y: -0.05, z: 0.52 },
            { x: 0.38, y: 0.6, z: 0.45 }, { x: -0.38, y: 0.6, z: 0.45 },
            { x: 0.15, y: 0.28, z: 0.92 }, { x: -0.15, y: 0.28, z: 0.92 },
            { x: 0, y: -0.28, z: 0.75 }
        ];
        
        glowPositions.forEach(pos => {
            const geometry = new THREE.SphereGeometry(0.09, 32, 32);
            const material = new THREE.MeshStandardMaterial({
                color: 0x3affd0,
                emissive: 0x3affd0,
                emissiveIntensity: 0.3,
                transparent: true
            });
            const sphere = new THREE.Mesh(geometry, material);
            sphere.position.set(pos.x, pos.y, pos.z);
            brainGroup.add(sphere);
            glowPoints.push(sphere);
        });
        
       
        const particleCount = 2000;
        const particlesGeo = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            const r = 1.0 + Math.random() * 0.8;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            positions[i*3] = r * Math.sin(phi) * Math.cos(theta);
            positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta) * 0.92;
            positions[i*3+2] = r * Math.cos(phi) * 0.9;
        }
        particlesGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const particlesMat = new THREE.PointsMaterial({ color: 0x3affd0, size: 0.007, transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending });
        const particles = new THREE.Points(particlesGeo, particlesMat);
        scene.add(particles);
        
        
        let currentState = 'normal';
        
        function setState(state) {
            currentState = state;
            const statusEl = document.getElementById('statusText');
            let color, intensity, statusText;
            
            if (state === 'normal') {
                color = 0x3affd0;
                intensity = 0.5;
                statusText = '🟢 STATE: NORMAL (SAFE)';
            } else if (state === 'warning') {
                color = 0xffaa44;
                intensity = 0.9;
                statusText = '🟠 STATE: PRE-SEIZURE (WARNING)';
            } else {
                color = 0xff3366;
                intensity = 1.3;
                statusText = '🔴 STATE: SEIZURE (CRITICAL)';
            }
            
            statusEl.textContent = statusText;
            accentLight.color.setHex(color);
            accentLight.intensity = intensity;
            
            glowPoints.forEach(point => {
                point.material.color.setHex(color);
                point.material.emissive.setHex(color);
                point.material.emissiveIntensity = intensity * 0.6;
            });
            
            particlesMat.color.setHex(color);
        }
        
        document.getElementById('btnNormal').onclick = () => setState('normal');
        document.getElementById('btnWarning').onclick = () => setState('warning');
        document.getElementById('btnSeizure').onclick = () => setState('seizure');
        
        
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            
            if (currentState === 'seizure') {
                const pulse = Math.sin(time * 12) * 0.5 + 0.8;
                accentLight.intensity = pulse * 1.2;
                particlesMat.opacity = 0.4 + Math.sin(time * 16) * 0.2;
            } else if (currentState === 'warning') {
                const pulse = Math.sin(time * 6) * 0.3 + 0.6;
                accentLight.intensity = pulse;
            } else {
                particlesMat.opacity = 0.3;
            }
            
            particles.rotation.y += 0.002;
            controls.update();
            renderer.render(scene, camera);
        }
        
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
